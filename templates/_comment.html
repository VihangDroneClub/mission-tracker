<div class="flex gap-4 group">
    <div class="flex-shrink-0">
        <div class="w-10 h-10 rounded-full bg-gradient-to-br from-slate-100 to-slate-200 dark:from-slate-800 dark:to-slate-700 flex items-center justify-center text-xs font-bold text-slate-500 border border-slate-200 dark:border-slate-700 shadow-sm group-hover:scale-105 transition-transform">
            {{ username[:1].upper() }}
        </div>
    </div>
    <div class="flex-grow">
        <div class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700/50 rounded-2xl p-4 shadow-sm group-hover:shadow-md transition-all">
            <div class="flex items-center justify-between mb-2">
                <span class="text-sm font-bold text-slate-900 dark:text-white">{{ username }}</span>
                <span class="text-[10px] font-bold uppercase tracking-wider text-slate-400">{{ comment.created_at[:16].replace('T', ' ') }}</span>
            </div>
            <p class="text-sm text-slate-600 dark:text-slate-300 leading-relaxed">{{ comment.content }}</p>
        </div>
    </div>
</div>
