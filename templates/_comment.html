<div class="flex gap-4 group">
    <div class="flex-shrink-0">
        <div class="w-10 h-10 rounded-full border border-primary/30 bg-primary/10 flex items-center justify-center text-xs font-bold text-primary shadow-sm group-hover:scale-105 transition-transform uppercase">
            {{ username[:1].upper() }}
        </div>
    </div>
    <div class="flex-grow">
        <div class="hud-border bg-surface-container-lowest/40 rounded-xl p-4 shadow-sm group-hover:hud-border-active transition-all">
            <div class="flex items-center justify-between mb-2">
                <span class="text-sm font-bold text-on-surface uppercase tracking-wide">{{ username }}</span>
                <span class="text-[9px] font-bold uppercase tracking-widest text-on-surface-variant opacity-60">{{ comment.created_at[:16].replace('T', ' ') }}</span>
            </div>
            <p class="text-sm text-on-surface-variant leading-relaxed {% if ui_mode == 'tactical' %}uppercase tracking-wide text-xs{% endif %}">{{ comment.content }}</p>
        </div>
    </div>
</div>
