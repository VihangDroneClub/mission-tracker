{% extends "base.html" %}
{% block title %}User Management{% endblock %}
{% block content %}
<h1>Users</h1>
<a href="/admin/users/add">+ Add New User</a>
<table border="1" style="margin-top: 10px;">
    <tr>
        <th>Username</th>
        <th>Display Name</th>
        <th>Role</th>
        <th>Change Role</th>
    </tr>
    {% for p in profiles %}
    <tr>
        <td>{{ p.username or 'No username' }}</td>
        <td>{{ p.display_name or p.id }}</td>
        <td>{{ p.role }}</td>
        <td>
            <form action="/admin/users/{{ p.id }}/role" method="post">
                <select name="new_role">
                    <option value="member" {% if p.role == 'member' %}selected{% endif %}>Member</option>
                    <option value="lead" {% if p.role == 'lead' %}selected{% endif %}>Lead</option>
                    <option value="admin" {% if p.role == 'admin' %}selected{% endif %}>Admin</option>
                </select>
                <button type="submit">Update</button>
            </form>
        </td>
    </tr>
    {% endfor %}
</table>
{% endblock %}
