{% extends "base.html" %}
{% block title %}Add User{% endblock %}
{% block content %}
<h1>Add New User</h1>
{% if error %}
    <p style="color:red;">{{ error }}</p>
{% endif %}
<form method="post">
    <label>Email: <input type="email" name="email" required></label><br><br>
    <label>Password: <input type="password" name="password" required></label><br><br>
    <label>Username (e.g. vhng_001): <input type="text" name="username" required pattern="[a-zA-Z0-9_]+"></label><br><br>
    <label>Display Name: <input type="text" name="display_name" required></label><br><br>
    <label>Role:
        <select name="role">
            <option value="member">Member</option>
            <option value="lead">Lead</option>
            <option value="admin">Admin</option>
        </select>
    </label><br><br>
    <button type="submit">Create User</button>
</form>
<p><a href="/admin/users">← Back to User List</a></p>
{% endblock %}
